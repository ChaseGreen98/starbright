{% extends "index.html" %}
{% load static %}

{% block content %}

<div id="intro-section">
    <h1 id="home-title-1">Starbright</h1>
    <h2 id="home-title-2">CAFE</h2>
    <a id="view-menu-link" target=blank href="https://order.dripos.com/Starbright-Cafe">← view the menu →</a>
    <img id="divider" src="{% static '/images/gold-divider.png' %}">
</div>

<div id="previews-section">
    <div id="preview-actions">
        <a class="preview-card" href="{% url 'community_view' %}">
            <span class="preview-kicker">Latest Newsletter</span>
            <span class="preview-title">{{ newsletter.title|default:"Read what is new" }}</span>
        </a>
        <a class="preview-card" target=blank href="https://order.dripos.com/Starbright-Cafe">
            <span class="preview-kicker">Freshly Made</span>
            <span class="preview-title">Order Online</span>
        </a>
        <a class="preview-card" href="{% url 'create_review' %}">
            <span class="preview-kicker">Share the Love</span>
            <span class="preview-title">Leave a Review</span>
        </a>
    </div>
</div>

{% endblock content %}
