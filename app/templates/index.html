{% load static %}

<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>{% block title %}Starbright Cafe{% endblock title %}</title>
    <link rel="stylesheet" href="{% static 'styles.css' %}">
</head>

<body>
    <main>
        <div id="navbar">
            <div id="nav-items">
                <a id="logo-anchor" href="{% url 'home' %}">
                    <img id="logo" src="{% static '/images/logo.jpg' %}">
                </a>
                <a class="nav-links" href="{% url 'behind_counter_view' %}">BEHIND THE COUNTER</a>
                <a class="nav-links" href="{% url 'community_view' %}">COMMUNITY</a>
                <a class="nav-links" href="{% url 'merch_view' %}">MERCH</a>
                <a id="menu-button" href="{% url 'menu_view' %}">MENU</a>
                <div id="menu-nav-links">
                    <a href="{% url 'coffee_view' %}">COFFEE</a>
                    <a href="{% url 'frappe_view' %}">FRAPPE</a>
                    <a href="{% url 'kids_view' %}">KIDS</a>
                    <a href="{% url 'food_view' %}">FOOD</a>
                    <a href="{% url 'specialty_view' %}">SPECIALTY</a>
                    <a href="{% url 'lotus_view' %}">LOTUS</a>
                    <a href="{% url 'other_view' %}">OTHER</a>
                </div>
            </div>
            <a target=blank href="https://order.dripos.com/Starbright-Cafe" id="shopping-cart-link">
                <img id="shopping-cart" src="{% static '/images/shopping-cart.png' %}">
            </a>
        </div>

        {% block content %}
        {% endblock content%}

        <div id="contact-section">
            <h1 id="contact-title">Contact us</h1>
        </div>
    </main>
</body>

</html>
