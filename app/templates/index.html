{% load static %}

<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>{% block title %}Starbright Cafe{% endblock title %}</title>
    <link rel="stylesheet" href="{% static 'styles.css' %}">
</head>

<body>
    <main>
        <div id="navbar">
            <div id="nav-items">
                <a href="{% url 'home' %}">
                    <img id="logo" src="{% static '/images/logo.jpg' %}">
                </a>
                <div id="nav-links">
                    <a href="{% url 'behind_counter_view' %}">BEHIND THE COUNTER</a>
                    <a href="{% url 'menu_view' %}">MENU</a>
                    <a href="{% url 'community_view' %}">COMMUNITY</a>
                </div>
            </div>
            <div id="shopping-cart-div">
                <img id="shopping-cart" src="{% static '/images/shopping-cart.png' %}">
            </div>
        </div>
        {% block content %}
        {% endblock content%}
    </main>
</body>

</html>
