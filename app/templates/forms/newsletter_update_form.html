{% extends "index.html" %}
{% block content %}

<div class="news_update_form_container">
    <section class="hero">
        <p class="kicker">Owner Portal</p>
        <h1 class="title">Update Newsletter</h1>
        <p class="intro">Refresh an existing note for the Starbright community.</p>
    </section>

    <div class="newsletter-form-panel">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Submit</button>
        </form>
    </div>
</div>

{% endblock content %}
