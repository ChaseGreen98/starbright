{% extends "index.html" %}

{% block title %}Confirm Delete{% endblock title %}

{% block content %}
<div class="login-page">
    <div class="hero">
        <p class="kicker">Starbright Cafe</p>
        <h1 class="title">Confirm Delete</h1>
        <p class="intro">Are you sure you want to delete this newsletter? This action can't be undone.</p>
    </div>

    <form method="POST" class="auth-form">
        {% csrf_token %}
        <div class="auth-actions">
            <button type="submit">Confirm Delete</button>
            <button id="cancel" href="{% url 'newsletter_list' %}">Cancel</button>
        </div>
    </form>
</div>
{% endblock content %}
